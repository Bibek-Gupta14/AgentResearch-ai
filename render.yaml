services:
  - type: web
    name: agentresearch-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
